name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package
        run: |
          zip -r SuspicionsPack-${{ github.ref_name }}.zip \
            SuspicionsPack/ \
            SuspicionsPackNudgeTool/ \
            SuspicionsPackClassIcons/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Suspicion's Pack ${{ github.ref_name }}"
          generate_release_notes: false
          files: SuspicionsPack-${{ github.ref_name }}.zip
